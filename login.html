<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surgical Route - Secure Admin Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
    height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-card {
    background-color: #ffffff;
    width: 100%;
    max-width: 420px;
    padding: 2.5rem;
    border-radius: 12px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    border: 1px solid #e2e8f0;
}

.brand-header {
    text-align: center;
    margin-bottom: 2rem;
}

.brand-header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: #0f172a;
}

.brand-header p {
    color: #64748b;
    font-size: 0.9rem;
}

.form-label {
    font-size: 0.875rem;
    font-weight: 500;
    color: #334155;
}

.form-control {
    border: 1px solid #cbd5e1;
    padding: 0.65rem 0.75rem;
    border-radius: 8px;
    font-size: 0.95rem;
    transition: 0.2s;
}

.form-control:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}

.btn-primary {
    background-color: #0f172a;
    border: none;
    padding: 0.7rem;
    font-weight: 500;
    border-radius: 8px;
    width: 100%;
    margin-top: 1.5rem;
    transition: 0.2s;
}

.btn-primary:hover {
    background-color: #020617;
}

.footer-text {
    text-align: center;
    font-size: 0.75rem;
    color: #94a3b8;
    margin-top: 2rem;
}
</style>
</head>

<body>

<div class="login-card">

    <div class="brand-header">
        <h1>Surgical Route</h1>
        <p>Secure Administrative Access</p>
    </div>

    <form method="POST" action="/login" autocomplete="off">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text"
                   name="username"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   required>
        </div>

        <button type="submit" class="btn btn-primary">
            Sign In
        </button>

    </form>

    <div class="footer-text">
        © 2026 Surgical Route Systems <br>
        All access attempts are logged.
    </div>

</div>

</body>
</html>
